name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build and Release Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: scarf-linux-amd64
          - os: macos-26
            target: x86_64-apple-darwin
            artifact_name: scarf-macos-intel
          - os: macos-26
            target: aarch64-apple-darwin
            artifact_name: scarf-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: scarf-windows-amd64

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Build Release Binary
        run: cargo build -p scarf --release --target ${{ matrix.target }}

      - name: Package Binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../${{ matrix.artifact_name }}.tar.gz scarf
          cd ../../..

      - name: Package Binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          powershell Compress-Archive -Path target/${{ matrix.target }}/release/scarf.exe -DestinationPath ${{ matrix.artifact_name }}.zip

      - name: Upload Binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            scarf-linux-amd64.tar.gz
            scarf-macos-intel.tar.gz
            scarf-macos-arm64.tar.gz
            scarf-windows-amd64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}