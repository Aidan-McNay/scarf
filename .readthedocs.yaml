# ReadTheDocs documentation for the Python bindings

version: "2"

build:
  os: "ubuntu-22.04"
  tools:
    python: "3.14"

sphinx:
  configuration: scarf-python/docs/conf.py
  builder: "dirhtml"

python:
  install:
    - requirements: scarf-python/docs/requirements.txt